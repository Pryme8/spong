name: spong

services:
  - name: web
    github:
      repo: Pryme8/spong
      branch: master
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-s
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: PUBLIC_DIR
        value: ./client/dist
        scope: RUN_TIME
      # Set to your app URL after first deploy, e.g. https://spong-xxxxx.ondigitalocean.app
      # Comma-separate multiple origins. Leave empty to allow all (not recommended for prod).
      - key: ALLOWED_ORIGINS
        value: ""
        scope: RUN_TIME
      # Optional: capacity limits (defaults are 100 / 20 / 8)
      # - key: MAX_CONNECTIONS
      #   value: "100"
      #   scope: RUN_TIME
      # - key: MAX_ROOMS
      #   value: "20"
      #   scope: RUN_TIME
      # - key: MAX_PLAYERS_PER_ROOM
      #   value: "8"
      #   scope: RUN_TIME
      # Optional: Sentry crash reporting
      # - key: SENTRY_DSN
      #   value: ""
      #   scope: RUN_TIME
      #   type: SECRET
      # Optional: PostHog analytics key (baked into client at build)
      # - key: VITE_POSTHOG_KEY
      #   value: ""
      #   scope: BUILD_TIME
      # Optional: Sentry browser DSN (baked into client at build)
      # - key: VITE_SENTRY_DSN
      #   value: ""
      #   scope: BUILD_TIME
      #   type: SECRET
      # Leave VITE_WS_URL unset — same-origin deploy uses window.location.host automatically
